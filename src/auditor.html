<!DOCTYPE html>
<html lang = "pt-BR">
    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
        <title>Auditoria | WMS Modular</title>

        <!-- CSS -->
        <link rel = "stylesheet" href = "css/style.css">
        </head>

    <body>

        <!-- Banner de status de conexão -->
        <div id = "netBanner" class = "banner banner--online" role = "status" aria-live = "polite">
            <span class = "banner__dot"></span>
            <span class = "banner__message">Sistema online</span>
        </div>

            <!-- Layout principal com sidebar -->
             <main class="page page--operator">

                <!-- sidebar -->
                 <aside class="sidebar">

                    <button class="sidebar__toggle" id="menuToggle">☰</button>

                    <nav class="sidebar__nav">

                        <h2 class="sidebar__title">WMS Modular</h2>

                        <a href="operador.html" class="sidebar__link">Operador</a>

                        <a href="auditor.html" class="sidebar__link sidebar__link--active">Auditoria</a>

                        <button id="logoutButton" class="sidebar__logout">Sair</button>
                    </nav>
                 </aside>

                    <!-- Conteúdo principal da página -->
                     <section class="content">

                        <header class="content__header">
                            <h1>Ocorrências</h1>
                            <p class="muted">Gerencie e visualize as ocorrências registradas no sistema.</p>
                        </header>

                        <!-- Tabela de ocorrências -->
                         <div class="table">

                            <div class="table__header">

                                <span>SKU</span>
                                <span>Endereço</span>
                                <span>Área</span>
                                <span>Quantidade</span>
                                <span>Status</span>
                                <span>Data</span>

                            </div>

                            <div id="ocurrencesList" class="table__body">

                                <!-- Dados virão do banco de dados -->

                            </div>

                         </div>

                     </section>

             </main>
             
             <!-- JavaScript -->
              <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
              <script src="js/supabase.js"></script>
              <script src="js/session.js"></script>
              <script src="js/network-status.js"></script>
              <script src="js/logout.js"></script>
              <script src="js/auditor.js"></script>

    </body>
</html>
