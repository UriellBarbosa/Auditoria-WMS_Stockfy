<!DOCTYPE html>
<html lang = "pt-BR">
    <head>
       <meta charset = "UTF-8">
         <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
        <title>Operador | WMS Modular</title>

        <!-- CSS -->
        <link rel="stylesheet" href="../../shared/css/style.css">
    </head>
    <body>

        <!-- Adiciona modal para confirmação da quantidade -->
     <div id = "qtyModal" class = "modal modal--hidden" role = "dialog" aria-modal = "true" aria-labelledby = "qtyModalTitle">
        <div class = "modal__backdrop" data-close = "true"></div>

        <div class = "modal__content">
            <h2 id = "qtyModalTitle" class = "modal__title">Confirmar quantidade</h2>
            
            <p class = "modal__text">
                Confirme quantidade contada:
                <strong id = "qtyModalValue">0</strong>
            </p>

            <div class = "modal__actions">
                <button id = "qtyModalCancel" class = "btn btn--ghost" type = "button">Cancelar</button>
                <button id = "qtyModalConfirm" class = "btn btn--primary" type = "button">Confirmar</button>
            </div>
        </div>
     </div>
        
        <!-- Banner de status de conexão -->
        <div id = "netBanner" class = "banner banner--online" role = "status" aria-live = "polite">
            <span class = "banner__dot"></span>
            <span class = "banner__message">Sistema online</span>
        </div>

            <!-- Layout principal com sidebar -->
        <div class = "app-layout">

            <!-- Barra lateral de navegação -->
            <aside class = "sidebar">
                <div class = "sidebar__brand">
                    <h1 class = "sidebar__title">WMS Modular</h1>
                    <p class = "sidebar__subtitle">Módulo Auditoria</p>
                    <p class="sidebar__user" id="sidebarUser">—</p>
                </div>

                <nav class = "sidebar__nav" id="sidebarNav" aria-label = "Menu principal">
                </nav>

                <div class = "sidebar__footer">
                    <button id="logoutButton" class = "btn btn--ghost btn--sidebar" type = "button">Sair</button>
                </div>
            </aside>

        <!-- Conteúdo principal da página -->
         <main class = "page page--operator page--content">
            <header class = "app-header">

            <button id = "menuToggle" class = "menu-toggle" aria-label = "Abrir menu">☰</button>
            
        </header>
            <!-- banner de envio (operador) escondido por padrão -->
             <div id = "sendBanner" class = "send-banner send-banner--hidden" role = "status" aria-live = "polite">
                <span id = "sendBannerText"class = "send-banner__text"></span>
            </div>

            <section class = "card card--wide card--panel" aria-labelledby ="op-title">
                <header class = "card__header">
                    <h1 id = "op-title" class = "card__title">Registrar ocorrência</h1>

                </header>
                
                <!-- Formulário de registro de ocorrência -->
                <form class = "form" action = "#" method = "post" autocomplete = "off" novalidate>
                
                <!-- Campo de Área -->
                <div class = "form__group">
                    <label class = "form__label" for = "area">Área</label>
                    <select class = "form__input" id = "area" name = "area" required>
                        <option value = "" selected disabled>selecione uma área</option>
                    </select>
                </div>
                
                <!-- Campo de SKU -->
                <div class = "form__group">
                    <label class = "form__label" for = "sku">SKU</label>
                    <input
                        class = "form__input"
                        id = "sku"
                        name = "sku"
                        type = "text"
                        inputmode = "text"
                        autocomplete = "off"
                        placeholder = "Escaneie ou digite o SKU"
                        required
                        />
                </div>
                
                <!-- Campo de Endereço -->
                <div class = "form__group">
                    <label class = "form__label" for = "address">Endereço</label>
                    <input
                        class = "form__input"
                        id = "address"
                        name = "address"
                        type = "text"
                        inputmode = "text"
                        autocomplete = "on"
                        placeholder = "Escaneie ou digite o endereço"
                        required
                        />
                </div>

                <!-- Campo de Quantidade -->
                <div class = "form__group">
                    <label class = "form__label" for = "qty">Quantidade</label>
                    <input
                        class = "form__input"
                        id = "qty"
                        name = "qty"
                        type = "number"
                        inputmode = "numeric"
                        min = "0"
                        step = "1"
                        placeholder = "Digite a quantidade contada"
                        required
                        />
                </div>
                
                <!-- Campo de observações -->
                <div class = "form__group">
                    <label class = "form__label" for = "note">Observações (opcional)</label>
                    <textarea
                        class = "form__input"
                        id = "note"
                        name = "note"
                        rows = "3"
                        placeholder = "Ex: SKU com quantidade diferente do WMS."
                        ></textarea>
                </div>

                <!-- Botão de salvar ocorrência -->
                <button class = "btn btn--primary" type = "submit">Salvar ocorrência</button>
                </form>
            </section>

            <!-- Rodapé da página -->
            <footer class = "footer">
                <small>© WMS Modular • Módulo Auditoria</small>
            </footer>
        </main>

        <!-- Scripts -->
        <script src ="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src ="../../shared/js/supabase.js"></script>
        <script src = "../../shared/js/network-status.js"></script>
        <script src = "../../shared/js/session.js"></script>
        <script src= "../../shared/js/sidebar.js"></script>
        <script src = "../../shared/js/menu.js"></script>
        <script src = "../../shared/js/logout.js"></script>
        <script src ="js/operator.js"></script>
    </body>
</html>
