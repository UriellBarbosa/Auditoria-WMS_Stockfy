<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minhas Ocorrências | WMS Modular</title>
    <link rel="stylesheet" href="../../shared/css/style.css"/>
  </head>
  <body>

    <!-- Banner de status de conexão -->
    <div id="netBanner" class="banner banner--online" role="status" aria-live="polite">
      <span class="banner__dot"></span>
      <span class="banner__message">Sistema online</span>
    </div>

    <div class="app-layout">

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar__brand">
          <h1 class="sidebar__title">WMS Modular</h1>
          <p class="sidebar__subtitle">Módulo Auditoria</p>
          <p class="sidebar__user" id="sidebarUser">—</p>
        </div>
        <nav class="sidebar__nav" id="sidebarNav" aria-label="Menu principal"></nav>
        <div class="sidebar__footer">
          <button id="logoutButton" class="btn btn--ghost btn--sidebar" type="button">Sair</button>
        </div>
      </aside>

      <!-- Conteúdo principal -->
      <main class="page page--operator page--content">
        <header class="app-header">
          <button id="menuToggle" class="menu-toggle" aria-label="Abrir menu">☰</button>
        </header>

        <!-- Banner de feedback -->
        <div id="dashBanner" class="send-banner send-banner--hidden" role="status" aria-live="polite">
          <span id="dashBannerText" class="send-banner__text"></span>
        </div>

        <section class="card card--wide card--panel" aria-labelledby="dash-title">
          <header class="card__header">
            <h1 id="dash-title" class="card__title">Minhas Ocorrências</h1>
            <p class="card__subtitle">Acompanhe suas ocorrências registradas.</p>
          </header>

          <!-- Filtro de período -->
          <div class="dashboard__period">
            <button class="btn--period btn--period--active" data-period="day">Hoje</button>
            <button class="btn--period" data-period="week">Esta semana</button>
            <button class="btn--period" data-period="month">Este mês</button>
          </div>

          <!-- Cards de resumo -->
          <div class="dashboard__cards">
            <div class="dashboard__card dashboard__card--total">
              <span class="dashboard__card-label">Total</span>
              <span class="dashboard__card-value" id="totalCount">—</span>
            </div>
            <div class="dashboard__card dashboard__card--pending">
              <span class="dashboard__card-label">Pendentes</span>
              <span class="dashboard__card-value" id="pendingCount">—</span>
            </div>
            <div class="dashboard__card dashboard__card--resolved">
              <span class="dashboard__card-label">Resolvidas</span>
              <span class="dashboard__card-value" id="resolvedCount">—</span>
            </div>
          </div>

          <!-- Tabela de ocorrências -->
          <div class="table dashboard__table">
            <div class="table__header">
              <span>SKU</span>
              <span>Endereço</span>
              <span>Área</span>
              <span>Quantidade</span>
              <span>Status</span>
              <span>Data</span>
            </div>

            <!-- Spinner -->
            <div id="dashLoadingSpinner" class="spinner">
              <div class="spinner__circle"></div>
            </div>
            <!-- Corpo da tabela -->
            <div id="dashOccurrencesList" class="table__body"></div>
            <!-- Paginação -->
            <div id="dashPagination" class="pagination"></div>

          </div>

        </section>

        <footer class="footer">
          <small>© WMS Modular • Módulo Auditoria</small>
        </footer>
      </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/modules/shared/js/supabase.js"></script>
    <script src="/modules/shared/js/network-status.js"></script>
    <script src="/modules/shared/js/session.js"></script>
    <script src="/modules/shared/js/sidebar.js"></script>
    <script src="/modules/shared/js/menu.js"></script>
    <script src="/modules/shared/js/logout.js"></script>
    <script src="/modules/auditoria/js/dashboard.js"></script>
  </body>
</html>
